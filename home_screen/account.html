<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="account.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <title>Account Page - Lipa Public Service</title>
  </head>
  <body>
    <div class="mobile-container">
      <h2>My Account</h2>

      <div class="profile-header">
        <div class="profile-circle">👤</div>
      </div>

      <form>
        <div class="form-group">
          <span>✉️</span>
          <input type="email" placeholder="Email Address" />
        </div>
        <div class="form-group">
          <span>🔒</span>
          <input type="password" placeholder="Password" />
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="signup-link">
        Don't have an account? <br />
        <a href="../auth/sign-up.html">Sign Up Now</a>
      </div>
    </div>
    <!-- NAVIGATION -->
    <nav class="navbar">
      <a href="service.html" class="nav-item">
        <i class="fas fa-concierge-bell"></i> Service
      </a>
      <a href="news.html" class="nav-item">
        <i class="fas fa-newspaper"></i> News
      </a>
      <a href="../home_screen/homescreen.html" class="nav-item">
        <i class="fas fa-home"></i> Home
      </a>
      <a href="emergency.html" class="nav-item">
        <i class="fas fa-ambulance"></i> Emergency
      </a>
      <a href="account.html" class="nav-item active">
        <i class="fas fa-user-circle"></i> Account
      </a>
    </nav>
  </body>
</html>
