<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency - News & Updates</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="emergency.css" />
  </head>
  <body>
    <header class="app-header">
      <h2>Emergency Contacts</h2>
    </header>

    <div class="container emergency-container">
      <p class="emergency-desc">Tap the buttons below to call immediately.</p>

      <div class="emergency-list">
        <a href="tel:911" class="emergency-card police">
          <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
          <div class="info">
            <h3>Police / PNP</h3>
            <p>911</p>
          </div>
          <i class="fas fa-phone-alt call-icon"></i>
        </a>

        <a href="tel:911" class="emergency-card fire">
          <div class="icon-box"><i class="fas fa-fire-extinguisher"></i></div>
          <div class="info">
            <h3>Fire Department</h3>
            <p>911</p>
          </div>
          <i class="fas fa-phone-alt call-icon"></i>
        </a>

        <a href="tel:911" class="emergency-card ambulance">
          <div class="icon-box"><i class="fas fa-ambulance"></i></div>
          <div class="info">
            <h3>Ambulance / Red Cross</h3>
            <p>143 / 911</p>
          </div>
          <i class="fas fa-phone-alt call-icon"></i>
        </a>

        <a href="tel:0288888888" class="emergency-card rescue">
          <div class="icon-box"><i class="fas fa-life-ring"></i></div>
          <div class="info">
            <h3>Disaster Response (NDRRMC)</h3>
            <p>(02) 8911-1406</p>
          </div>
          <i class="fas fa-phone-alt call-icon"></i>
        </a>
      </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="navbar">
      <a href="service.html" class="nav-item">
        <i class="fas fa-concierge-bell"></i> Service
      </a>
      <a href="news.html" class="nav-item">
        <i class="fas fa-newspaper"></i> News
      </a>
      <a href="../home_screen/homescreen.html" class="nav-item">
        <i class="fas fa-home"></i> Home
      </a>
      <a href="emergency.html" class="nav-item active">
        <i class="fas fa-ambulance"></i> Emergency
      </a>
      <a href="account.html" class="nav-item">
        <i class="fas fa-user-circle"></i> Account
      </a>
    </nav>
  </body>
</html>
