<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="data.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>PERSONAL PROFILE</h1>
      </header>

      <section class="intro">
        <p>Complete your profile details below.</p>
      </section>

      <form>
        <div class="section-label">LEGAL NAME</div>
        <div class="form-group flex-1">
          <label>FIRST NAME</label>
          <input type="text" placeholder="e.g. John" required />
        </div>

        <div class="row">
          <div class="form-group flex-3">
            <label>LAST NAME</label>
            <input type="text" placeholder="e.g. Doe" required />
          </div>
          <div class="form-item flex-1">
            <label>M.I.</label>
            <input type="text" placeholder="A" />
          </div>
        </div>

        <div class="form-group flex-1">
          <label>SUFFIX (OPTIONAL)</label>
          <input type="text" placeholder="e.g. Jr., III" />
        </div>

        <div class="section-label">DEMOGRAPHICS</div>
        <div class="row">
          <div class="field-group flex-1">
            <label>GENDER</label>
            <select>
              <option>Select</option>
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
          <div class="form-row flex-1">
            <label>DATE OF BIRTH</label>
            <input type="date" />
          </div>
        </div>
        <div class="form-group flex-1">
          <label>PLACE OF BIRTH</label>
          <input type="text" placeholder="City, Province/State" />
        </div>

        <div class="address-card">
          <div class="section-label card-label">ADDRESS DETAILS</div>
          <div class="row">
            <div class="form-group flex-1">
              <label>HOUSE NO.</label>
              <input type="text" placeholder="123" required />
            </div>
            <div class="form-group flex-2">
              <label>BARANGAY / DISTRICT</label>
              <input type="text" placeholder="Brgy. Name" required/>
            </div>
          </div>

          <div class="form-group full-width">
            <label>MUNICIPALITY / CITY</label>
            <input type="text" placeholder="Metro City" required />
          </div>
          <div class="form-field full-width" required>
            <label>COUNTRY</label>
            <select>
              <option>Select</option>
              <option>Philippines</option>
              <option>USA</option>
              <option>CANADA</option>
              <option>SINGAPORE</option>
            </select>
          </div>
        </div>

        <div class="section-label">CONTACT</div>
        <div class="form-group flex-1"">
          <label>EMAIL ADDRESS</label>
          <input type="email" placeholder="john.doe@email.com" required />
        </div>
        <div class="form-group full-width">
          <label>PHONE NUMBER</label>
          <input type="tel" placeholder="+63 000 000 0000" />
        </div>

        <div class="actions">
          <button type="submit" class="btn-save">Save Information</button>
          <button type="button" class="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </body>
</html>
