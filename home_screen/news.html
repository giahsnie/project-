  <style>
        .p{
          text-align: center;
           color: #888;
           margin-top: 50px"

        .navbar {
      display: flex;
      justify-content: space-around;
      background-color: #ffffff;
      padding: 15px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-width: 500px;
      box-shadow: 0px -2px 4px rgba(0, 0, 0, 0.1);
    }

    .nav-item {
      color: rgb(0, 0, 0);
      text-decoration: none;
      display: flex;
      flex-direction: column; /* Stack icon on top of text */
      align-items: center;
      gap: 5px; /* Space between icon and text */
      font-family: sans-serif;
      font-size: 14px;
      position: relative;
    }

    .nav-item i {
      font-size: 20px; /* Makes the icon slightly larger */
    }

    .nav-item:hover,
    .active {
      color: #9d4242; /* Highlight color */
    }
  </style>
