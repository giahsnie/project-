<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    * {
      box-sizing: border-box;
      font-family: Poppins Bold, sans-serif;
    }

    body {
      margin: 0;
      background: #E5DFD3;
      display: flex;
      justify-content: center;
    }
.screen {
      width: 100%;
      max-width: 420px;
      padding: 28px 22px 40px;
    }

    .h1 {
      font-size: 34px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 8px;
      color: #9D4242;
    }
    .subtitle {
      color: #601212;
      font-size: 16px;
      margin-top: -20px;
    }

    .label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 48px;
      font-size: 16px;
      border-radius: 16px;
      border: 1.5px solid #9D4242;
      outline: none;
    }

    .input-wrapper i.left {
      position: absolute;
      left: 18px;
      top: 50%; 
      transform: translateY(-50%);
      color: #DAC8C8;
      font-size: 18px;
    }

    .input-wrapper i.right {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #9D4242;
      font-size: 18px;
      cursor: pointer;
    }

    .password-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .forgot {
      color: #e6345a;
      font-size: 14px;
      text-decoration: none;
      font-weight: 500;
    }
    .input-wrapper .forgot {
      position: absolute;
      right: 18px;
      top: 60%;
      transform: translateY(-100%);
    }

    .signin-btn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: #9D4242;
      border: none;
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(255, 30, 124, 0.096);
      cursor: pointer;
      bottom: 10px;
      margin-top: 8px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 34px 0;
      font-size: 14px;
      color: #601212;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #601212;
    }

    .divider span {
      margin: 0 12px;
    }

    .social {
      display: flex;
      gap: 14px;
    }

    .social button {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      border: 1.5px solid #9D4242;
      background: #DAC8C8;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 15px;
      color: #000000;
    }

    .footer a {
      color: #9D4242;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
<body>
    <div class="screen">
    <h1>Welcome back!</h1>
    <p class="subtitle">Sign in to your account</p>

    <label>Email Address</label>
    <div class="input-wrapper"> 
      <i class="fa-solid fa-envelope left"></i>
      <i class="fa-solid fa-xmark right"></i>
      <input type="email" placeholder="@samexample.com" />
    </div>
    <div class="password-header"
      <label>Password</label>
    </div>
    <div class="input-wrapper">
      <i class="fa-solid fa-lock left"></i>
      <i class="fa-solid fa-eye right"></i>
      <input type="password" placeholder="Enter your password" id="password" name="password" required />
    </div>
    <div class="input-wrapper">
      <a href="#" class="forgot">Forgot Password?</a>
    </div>
    
    <button class="signin-btn">Sign In <span> <a href="../home_screen/homescreen.html"></a> </span></button> 

    <div class="footer">
      Don’t have an account?
    <a href="../auth/sign-up.html">Create New Account</a>
    </div>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="social">
      <button>
        <i class="fa-brands fa-google"></i>
        Google
      </button>
      <button>
        <i class="fa-brands fa-apple"></i>
        Apple
      </button>
    </div>
  </div>
</body>
</html>
